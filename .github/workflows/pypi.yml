name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t ai-guard-test -f .github/workflows/ci.Dockerfile .

      - name: Run linting and tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            ai-guard-test \
            bash -c "
              pip install '.[dev]' &&
              ruff format --check . &&
              ruff check . &&
              pytest
            "

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify pyproject.toml version matches tag
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME implies version $TAG_VERSION, but pyproject.toml has $PROJECT_VERSION"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Install build dependencies
        run: python -m pip install --upgrade build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
